
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500;600;700&display=swap');

  /* progress */
  .progress-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px}

  /* phase tabs */
  .phases{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
  .phase-tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:all .2s;font-family:var(--font-ui)}

  .phase-tab .ph-num{display:block;font-family:var(--font-mono);font-size:10px;color:inherit;opacity:.7;margin-bottom:2px}

  .step{border-bottom:1px solid var(--border);padding:14px 16px;cursor:pointer;transition:background .15s}

  .copy-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:10px;padding:3px 8px;border-radius:4px;cursor:pointer;font-family:var(--font-mono);transition:all .15s}

  .cmd-body .g{color:var(--green)}
  .cmd-body .b{color:var(--blue)}
  .cmd-body .o{color:var(--orange)}
  .cmd-body .p{color:var(--purple)}
  .cmd-body .y{color:var(--yellow)}
  .cmd-body .w{color:var(--white)}

  /* note */
  .note{margin:8px 16px;padding:8px 12px;border-radius:6px;font-size:11px;line-height:1.5;border-left:3px solid}
  .note.info{background:#0D1F33;border-color:var(--blue);color:#88C1F0}
  .note.warn{background:#2A1500;border-color:var(--orange);color:#E8A855}
  .note.success{background:#0A1F0D;border-color:var(--green);color:#6ECC7A}

  /* bottom bar */
  .bottombar{background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
  .status-text{font-family:var(--font-mono);font-size:11px;color:var(--muted)}

__pycache__/

      {

        desc: 'Python venv, install all deps (FastAPI, Uvicorn, Celery, Anthropic, OpenAI Whisper, Sentry, Datadog)',
        tags: ['cli'],
        cmd: `cd apps/agent-service

# Create Python virtual environment
python -m venv .venv && source .venv/bin/activate

# Install all dependencies
pip install \\

  uvicorn[standard]==0.30.0 \\

touch app/__init__.py app/api/__init__.py app/api/v1/__init__.py
touch app/agents/__init__.py app/workers/__init__.py

# Create app/config.py
cat > app/config.py << 'EOF'
from pydantic_settings import BaseSettings
from functools import lru_cache

class Settings(BaseSettings):
    ENV: str = "development"
    VERSION: str = "1.0.0"
    DATABASE_URL: str = ""
    REDIS_URL: str = "redis://localhost:6379"
    JWT_SECRET: str = "change-me"
    ANTHROPIC_API_KEY: str = ""
    OPENAI_API_KEY: str = ""
    IRCTC_API_KEY: str = ""
    REDBUS_API_KEY: str = ""
    DIGILOCKER_CLIENT_ID: str = ""
    RAZORPAY_KEY_ID: str = ""
    RAZORPAY_KEY_SECRET: str = ""
    GOOGLE_MAPS_API_KEY: str = ""
    SENTRY_DSN: str = ""
    DD_API_KEY: str = ""
    class Config:
        env_file = ".env"

@lru_cache
def get_settings(): return Settings()
settings = get_settings()
EOF

# Create app/main.py
cat > app/main.py << 'EOF'
import sentry_sdk
from fastapi import FastAPI
from fastapi.middleware.cors import CORSMiddleware
from contextlib import asynccontextmanager
from app.config import settings

sentry_sdk.init(
    dsn=settings.SENTRY_DSN,
    traces_sample_rate=1.0,
    environment=settings.ENV,
)

@asynccontextmanager
async def lifespan(app: FastAPI):
    print(f"WayGo Agent Service starting — env: {settings.ENV}")
    yield
    print("Shutting down")

app = FastAPI(title="WayGo Agent Service", version=settings.VERSION, lifespan=lifespan)
app.add_middleware(CORSMiddleware, allow_origins=["*"], allow_methods=["*"], allow_headers=["*"])

@app.get("/health")
async def health():
    return {"status": "ok", "service": "agent", "version": settings.VERSION, "env": settings.ENV}
EOF

RUN pip install --no-cache-dir -r requirements.txt
COPY . .
EXPOSE 8000
CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
EOF

# Test it starts
uvicorn app.main:app --port 8000 &
sleep 2 && curl http://localhost:8000/health

        cmd: `cd apps/api-gateway

pnpm init -y

pnpm add fastify @fastify/cors @fastify/jwt @fastify/rate-limit \\
  @fastify/websocket @fastify/helmet @fastify/http-proxy \\
  @sentry/node dd-trace twilio zod

pnpm add -D typescript @types/node tsx nodemon

# tsconfig.json
cat > tsconfig.json << 'EOF'
{
  "compilerOptions": {
    "target": "ES2022", "module": "CommonJS", "moduleResolution": "node",
    "strict": true, "esModuleInterop": true, "outDir": "dist",
    "rootDir": "src", "skipLibCheck": true
  },
  "include": ["src/**/*"]
}
EOF

mkdir -p src/routes

# src/index.ts
cat > src/index.ts << 'EOF'
import tracer from "dd-trace";
tracer.init({ service: "waygo-api-gateway", env: process.env.NODE_ENV });

import * as Sentry from "@sentry/node";
Sentry.init({ dsn: process.env.SENTRY_DSN!, tracesSampleRate: 1.0 });

import Fastify from "fastify";
import cors       from "@fastify/cors";
import jwt        from "@fastify/jwt";
import rateLimit  from "@fastify/rate-limit";
import websocket  from "@fastify/websocket";
import helmet     from "@fastify/helmet";

const app = Fastify({ logger: true });

await app.register(helmet);
await app.register(cors, { origin: true });
await app.register(jwt, { secret: process.env.JWT_SECRET! });
await app.register(rateLimit, { max: 100, timeWindow: "1 minute" });
await app.register(websocket);

app.get("/health", async () => ({ status: "ok", service: "gateway" }));

try {
  await app.listen({ port: 3001, host: "0.0.0.0" });
  console.log("Fastify gateway running on :3001");
} catch (err) {
  app.log.error(err);
  process.exit(1);
}
EOF

# package.json scripts

    "dev": "nodemon --exec tsx src/index.ts",
    "build": "tsc",
    "start": "node dist/index.js"
  }
}
EOF

COPY package.json pnpm-lock.yaml* ./
RUN pnpm install --frozen-lockfile
COPY . .
RUN pnpm build
EXPOSE 3001
CMD ["node", "dist/index.js"]
EOF

      }

      {

  const total = totalSteps();
  const done = doneCount();
  const pct = Math.round((done / total) * 100);
  document.getElementById('progBar').style.width = pct + '%';
  document.getElementById('progLabel').textContent = done + ' / ' + total + ' done';
  document.getElementById('statusText').textContent =
    pct === 100 ? '🎉 First commit ready — everything done!' :
    pct > 0 ? `${pct}% complete — keep going` :
    'Click any step to expand commands';
}

function renderAll() {
  const container = document.getElementById('mainContent');
  container.innerHTML = '';
  phases.forEach((phase, pi) => {
    const div = document.createElement('div');
    div.className = 'phase-content' + (pi === currentPhase ? ' active' : '');
    div.id = 'phase-' + pi;
    phase.steps.forEach(step => {
      if (!state[step.id]) state[step.id] = { done: false, expanded: false };
      const s = state[step.id];
      const el = document.createElement('div');
      el.className = 'step' + (s.done ? ' done' : '') + (s.expanded ? ' expanded' : '');
      el.id = 'step-' + step.id;

      const tags = step.tags.map(t => `<span class="tag ${t}">${t.toUpperCase()}</span>`).join('');
      const noteHtml = step.note ? `<div class="note ${step.note.type}" style="margin:10px 0 0;">${step.note.text}</div>` : '';

      el.innerHTML = `
        <div class="step-header" onclick="toggleStep('${step.id}')">
          <div class="step-check" onclick="event.stopPropagation(); toggleDone('${step.id}')">
            <span class="check-icon">✓</span>
          </div>
          <div class="step-meta">
            <div class="step-title">${step.title}</div>
            <div class="step-desc">${step.desc}</div>
            <div class="step-tags">${tags}</div>
          </div>
        </div>
        <div class="cmd-block">
          <div class="cmd-header">
            <span class="cmd-label">bash</span>
            <button class="copy-btn" onclick="copyCmd('${step.id}')">Copy</button>
          </div>
          <div class="cmd-body" id="cmd-${step.id}">${formatCmd(step.cmd)}</div>
          ${noteHtml}
        </div>
      `;
      div.appendChild(el);
    });
    container.appendChild(div);
  });
  updateProgress();
}

function formatCmd(cmd) {
  return cmd
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .split('\n')
    .map(line => {
      if (line.trim().startsWith('#')) return `<span class="c">${line}</span>`;
      return line
        .replace(/(pnpm|npm|npx|pip|python|uvicorn|gh|git|docker|aws|terraform|curl|cat|mkdir|touch|cp|echo|source|kill|sleep|node)\b/g, '<span class="g">$1</span>')
        .replace(/("([^"]*)")/g, '<span class="y">$1</span>')
        .replace(/(--[\w-]+)/g, '<span class="b">$1</span>');
    })
    .join('\n');
}

function toggleStep(id) {
  state[id].expanded = !state[id].expanded;
  const el = document.getElementById('step-' + id);
  el.classList.toggle('expanded', state[id].expanded);
}

function toggleDone(id) {
  state[id].done = !state[id].done;
  const el = document.getElementById('step-' + id);
  el.classList.toggle('done', state[id].done);
  updateProgress();
}

function copyCmd(id) {
  const step = phases.flatMap(p => p.steps).find(s => s.id === id);
  if (!step) return;
  navigator.clipboard.writeText(step.cmd).then(() => {
    const btn = document.querySelector(`#step-${id} .copy-btn`);
    if (btn) {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    }
  });
}

function switchPhase(idx) {
  currentPhase = idx;
  document.querySelectorAll('.phase-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.phase-content').forEach((c, i) => c.classList.toggle('active', i === idx));
}

function resetAll() {
  Object.keys(state).forEach(k => { state[k].done = false; state[k].expanded = false; });
  renderAll();
}

function markPhoneDone() {
  phases[currentPhase].steps.forEach(s => { state[s.id].done = true; });
  renderAll();
}

renderAll();
</script>
